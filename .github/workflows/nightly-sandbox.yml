# v0.16 Track 5 — three-provider end-to-end nightly sandbox soak.
#
# Runs the live-sandbox soak test 3 consecutive times against
# Stripe + Resend + Didit sandbox accounts. Three green = pass;
# any failure surfaces in the workflow status. Spec line 285:
# "A flake → dig in BEFORE shipping; do not paper over."
#
# Triggers:
#   * cron 03:00 UTC nightly
#   * workflow_dispatch (manual)
#
# Required repo secrets (configure under Settings → Secrets and
# variables → Actions):
#   * BSS_PAYMENT_STRIPE_API_KEY        (sk_test_*)
#   * BSS_PAYMENT_STRIPE_PUBLISHABLE_KEY (pk_test_*)
#   * BSS_PAYMENT_STRIPE_WEBHOOK_SECRET (whsec_*)
#   * BSS_PORTAL_KYC_DIDIT_API_KEY      (sandbox)
#   * BSS_PORTAL_KYC_DIDIT_WORKFLOW_ID  (UUID)
#   * BSS_PORTAL_EMAIL_RESEND_API_KEY   (re_*)
#
# Optional repo secrets:
#   * BSS_PAYMENT_WEBHOOK_PUBLIC_URL    (Tailscale Funnel / ngrok URL
#     for the webhook round-trip test; the test skips cleanly if unset)
#
# Setup runbook: docs/runbooks/three-provider-sandbox-soak.md

name: nightly-sandbox

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      runs:
        description: "Number of consecutive runs (3 = release-gate; lower = debug only)"
        default: "3"
        required: false

permissions:
  contents: read

jobs:
  three-provider-soak:
    name: three-provider sandbox soak (run ${{ matrix.run_index }}/3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # surface ALL failures, not just the first
      matrix:
        run_index: [1, 2, 3]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bss
          POSTGRES_PASSWORD: bss
          POSTGRES_DB: bss
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: install workspace
        run: uv sync --all-extras --all-groups

      - name: apply migrations
        env:
          BSS_DB_URL: postgresql+asyncpg://bss:bss@localhost:5432/bss
        run: |
          cd packages/bss-models
          uv run --package bss-models alembic upgrade head

      - name: run live-sandbox soak (run ${{ matrix.run_index }}/3)
        env:
          BSS_NIGHTLY_SANDBOX: "true"
          BSS_DB_URL: postgresql+asyncpg://bss:bss@localhost:5432/bss
          BSS_PAYMENT_STRIPE_API_KEY: ${{ secrets.BSS_PAYMENT_STRIPE_API_KEY }}
          BSS_PAYMENT_STRIPE_PUBLISHABLE_KEY: ${{ secrets.BSS_PAYMENT_STRIPE_PUBLISHABLE_KEY }}
          BSS_PAYMENT_STRIPE_WEBHOOK_SECRET: ${{ secrets.BSS_PAYMENT_STRIPE_WEBHOOK_SECRET }}
          BSS_PORTAL_KYC_DIDIT_API_KEY: ${{ secrets.BSS_PORTAL_KYC_DIDIT_API_KEY }}
          BSS_PORTAL_KYC_DIDIT_WORKFLOW_ID: ${{ secrets.BSS_PORTAL_KYC_DIDIT_WORKFLOW_ID }}
          BSS_PORTAL_EMAIL_RESEND_API_KEY: ${{ secrets.BSS_PORTAL_EMAIL_RESEND_API_KEY }}
          BSS_PAYMENT_WEBHOOK_PUBLIC_URL: ${{ secrets.BSS_PAYMENT_WEBHOOK_PUBLIC_URL }}
        run: |
          PYTHONPATH=services/payment:scenarios uv run --package payment \
            pytest scenarios/live_sandbox/ -v --tb=short

  release-gate:
    name: three-consecutive-green release gate
    runs-on: ubuntu-latest
    needs: three-provider-soak
    if: success()
    steps:
      - name: announce green
        run: |
          echo "✅ Three consecutive green sandbox runs."
          echo "v0.16 release gate cleared per phases/V0_16_0.md §5."

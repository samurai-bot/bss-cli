x-bss-build: &bss-build
  context: .
  dockerfile: services/_template/Dockerfile

x-bss-service: &bss-service
  env_file: .env
  restart: unless-stopped
  networks: [bss]

services:
  catalog:
    <<: *bss-service
    build:
      context: .
      dockerfile: services/catalog/Dockerfile
    ports: ["8001:8000"]
    environment: { BSS_SERVICE_NAME: catalog }

  crm:
    <<: *bss-service
    build:
      context: .
      dockerfile: services/crm/Dockerfile
    ports: ["8002:8000"]
    environment: { BSS_SERVICE_NAME: crm }

  payment:
    <<: *bss-service
    build:
      context: .
      dockerfile: services/payment/Dockerfile
    ports: ["8003:8000"]
    environment: { BSS_SERVICE_NAME: payment }

  com:
    <<: *bss-service
    build:
      context: .
      dockerfile: services/com/Dockerfile
    ports: ["8004:8000"]
    environment:
      BSS_SERVICE_NAME: com
      BSS_CRM_URL: http://crm:8000
      BSS_CATALOG_URL: http://catalog:8000
      BSS_PAYMENT_URL: http://payment:8000
      BSS_SOM_URL: http://som:8000
      BSS_SUBSCRIPTION_URL: http://subscription:8000
    depends_on: [crm, catalog, payment, som, subscription]

  som:
    <<: *bss-service
    build:
      context: .
      dockerfile: services/som/Dockerfile
    ports: ["8005:8000"]
    environment:
      BSS_SERVICE_NAME: som
      BSS_CRM_URL: http://crm:8000
    depends_on: [crm]

  subscription:
    <<: *bss-service
    build:
      context: .
      dockerfile: services/subscription/Dockerfile
    ports: ["8006:8000"]
    environment:
      BSS_SERVICE_NAME: subscription
      BSS_CRM_URL: http://crm:8000
      BSS_CATALOG_URL: http://catalog:8000
      BSS_PAYMENT_URL: http://payment:8000
    depends_on: [crm, catalog, payment]

  mediation:
    <<: *bss-service
    build:
      context: .
      dockerfile: services/mediation/Dockerfile
    ports: ["8007:8000"]
    environment:
      BSS_SERVICE_NAME: mediation
      BSS_SUBSCRIPTION_URL: http://subscription:8000
    depends_on: [subscription]

  rating:
    <<: *bss-service
    build:
      context: .
      dockerfile: services/rating/Dockerfile
    ports: ["8008:8000"]
    environment:
      BSS_SERVICE_NAME: rating
      BSS_CATALOG_URL: http://catalog:8000
    depends_on: [catalog]

  # port 8009 reserved for v0.2 billing service (deferred — see DECISIONS.md 2026-04-13)

  provisioning-sim:
    <<: *bss-service
    build:
      context: .
      dockerfile: services/provisioning-sim/Dockerfile
    ports: ["8010:8000"]
    environment:
      BSS_SERVICE_NAME: provisioning-sim

  # v0.4 — self-serve customer portal. Public-facing (no inbound auth);
  # outbound calls carry BSS_API_TOKEN via orchestrator's client factory.
  # Port 9001 is the first of the 9xxx portal range; v0.5 CSR takes 9002.
  portal-self-serve:
    <<: *bss-service
    build:
      context: .
      dockerfile: portals/self-serve/Dockerfile
    ports: ["9001:8000"]
    environment:
      BSS_SERVICE_NAME: portal-self-serve
      BSS_CATALOG_URL: http://catalog:8000
      BSS_COM_URL: http://com:8000
      BSS_SUBSCRIPTION_URL: http://subscription:8000
      BSS_CRM_URL: http://crm:8000
    depends_on:
      catalog: { condition: service_healthy }
      crm:     { condition: service_healthy }
      com:     { condition: service_healthy }
      subscription: { condition: service_healthy }
      payment: { condition: service_healthy }

networks:
  bss:
    driver: bridge

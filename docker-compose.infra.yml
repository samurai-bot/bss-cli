services:
  postgres:
    # v0.20+ — pgvector required for the cockpit knowledge tool's
    # knowledge.doc_chunk table (FTS-only deployments still work, the
    # extension is just present and unused). Drop-in same-major
    # replacement for stock postgres:16-alpine; data dir format
    # identical, volume mounts unchanged. Migration 0022 runs
    # CREATE EXTENSION IF NOT EXISTS vector. See
    # docs/runbooks/knowledge-indexer.md for the bundled-mode swap
    # procedure + the BYOI one-time CREATE EXTENSION alternative.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bss
      POSTGRES_PASSWORD: bss
      POSTGRES_DB: bss
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "bss"]
      interval: 10s
      retries: 5
    networks: [bss]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports: ["5672:5672", "15672:15672"]
    volumes: [rabbitmq_data:/var/lib/rabbitmq]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      retries: 5
    networks: [bss]

  metabase:
    image: metabase/metabase:latest
    ports: ["3000:3000"]
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: bss
      MB_DB_PORT: 5432
      MB_DB_USER: bss
      MB_DB_PASS: bss
      MB_DB_HOST: postgres
    depends_on: [postgres]
    networks: [bss]

  jaeger:
    image: jaegertracing/all-in-one:1.65.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: "memory"
    ports:
      - "4317:4317"   # OTLP/gRPC ingress
      - "4318:4318"   # OTLP/HTTP ingress
      - "16686:16686" # Jaeger UI
    networks: [bss]

volumes:
  postgres_data: {}
  rabbitmq_data: {}

networks:
  bss:
    driver: bridge

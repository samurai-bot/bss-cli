[project]
name = "bss-middleware"
version = "0.1.0"
requires-python = ">=3.12"
description = "Shared FastAPI/ASGI middleware for BSS-CLI services. v0.3 ships the API token auth middleware; future versions add to this package."
dependencies = [
    "structlog>=24.0",
    "pydantic-settings>=2.0",
    "starlette>=0.40",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "fastapi>=0.110",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"

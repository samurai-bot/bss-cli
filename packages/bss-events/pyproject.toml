[project]
name = "bss-events"
version = "0.1.0"
requires-python = ">=3.12"
description = "Shared audit-events query router — scenarios read domain-event history via /audit-api/v1/events."
dependencies = [
    "fastapi>=0.110",
    "sqlalchemy>=2.0",
    "structlog>=24.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"

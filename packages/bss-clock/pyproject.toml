[project]
name = "bss-clock"
version = "0.1.0"
requires-python = ">=3.12"
description = "Process-local scenario clock — wall-clock default, freeze/advance for scenarios."
dependencies = [
    "fastapi>=0.110",
    "structlog>=24.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"

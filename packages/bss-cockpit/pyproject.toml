[project]
name = "bss-cockpit"
version = "0.1.0"
requires-python = ">=3.12"
description = "Operator-cockpit Conversation store + OPERATOR.md/settings.toml loader + cockpit prompt builder. Backs both surfaces of the v0.13 unified cockpit (CLI REPL canonical, browser veneer). See phases/V0_13_0.md."
dependencies = [
    "sqlalchemy>=2.0",
    "asyncpg>=0.29",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "structlog>=24.0",
    "bss-clock",
    "bss-models",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
bss-clock = { workspace = true }
bss-models = { workspace = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"

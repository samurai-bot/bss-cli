[project]
name = "bss-portal-auth"
version = "0.1.0"
requires-python = ">=3.12"
description = "Email-based portal identity (magic link + OTP), server-side sessions, step-up auth, and audit. Pure-Python library; portals consume the API directly. v0.8 — see phases/V0_8_0.md."
dependencies = [
    "sqlalchemy>=2.0",
    "asyncpg>=0.29",
    "structlog>=24.0",
    "pydantic-settings>=2.0",
    "bss-clock",
    "bss-models",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
bss-clock = { workspace = true }
bss-models = { workspace = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"

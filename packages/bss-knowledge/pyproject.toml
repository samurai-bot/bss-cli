[project]
name = "bss-knowledge"
version = "0.1.0"
requires-python = ">=3.12"
description = "Indexer + Tier-0 FTS / Tier-1 hybrid search over the BSS-CLI doc corpus (HANDBOOK + CLAUDE + runbooks + ARCHITECTURE + DECISIONS + TOOL_SURFACE + ROADMAP + CONTRIBUTING). Backs the v0.20 cockpit knowledge tools. See phases/V0_20_0.md."
dependencies = [
    "sqlalchemy>=2.0",
    "asyncpg>=0.29",
    "structlog>=24.0",
    "bss-clock",
    "bss-models",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
bss-clock = { workspace = true }
bss-models = { workspace = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"

[project]
name = "bss-webhooks"
version = "0.1.0"
requires-python = ">=3.12"
description = "Shared webhook substrate for BSS-CLI real-provider integrations: signature verification (svix/stripe/didit_hmac), idempotency keys, payload redaction, and persistence helpers."
dependencies = [
    "structlog>=24.0",
    "sqlalchemy>=2.0",
    "asyncpg>=0.29",
    "bss-clock",
    "bss-models",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.uv.sources]
bss-clock = { workspace = true }
bss-models = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"

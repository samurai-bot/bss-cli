[project]
name = "bss-portal-ui"
version = "0.1.0"
requires-python = ">=3.12"
description = "Shared UI bits for BSS-CLI portals — agent log widget, SSE plumbing, base CSS, vendored HTMX. Consumed by portals/self-serve and portals/csr."
dependencies = [
    "jinja2>=3.1",
    "bss-cockpit",
    "bss-orchestrator",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["bss_portal_ui"]

[tool.hatch.build.targets.wheel.force-include]
"bss_portal_ui/templates" = "bss_portal_ui/templates"
"bss_portal_ui/static" = "bss_portal_ui/static"

[tool.uv.sources]
bss-cockpit = { workspace = true }
bss-orchestrator = { workspace = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"

[project]
name = "bss-e2e"
version = "0.1.0"
requires-python = ">=3.12"
description = "v1.4 — Playwright-driven end-to-end suite for BSS-CLI self-serve portal + operator cockpit veneer"
license = "Apache-2.0"
dependencies = [
    # Test framework + reporting
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-html>=4.1",
    # Browser automation
    "playwright>=1.45",
    # State setup + verification
    "bss-clients",
    "httpx>=0.27",
    "asyncpg>=0.29",
]

[tool.uv.sources]
bss-clients = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
# The whole suite uses Playwright's SYNCHRONOUS API (the sync-first pattern
# Playwright recommends with pytest). asyncio_mode=auto from the root config
# wraps every fixture in an event loop; ``strict`` keeps the loop scoped to
# explicitly-marked async tests, leaving sync fixtures free to spin up their
# own loops (the ``available_msisdn`` fixture does this for asyncpg).
asyncio_mode = "strict"
# Re-state importlib mode here so pytest's own rootdir auto-detection
# (which picks this pyproject when running from the package dir) keeps
# the same import semantics as the root suite.
addopts = "--import-mode=importlib"
markers = [
    "self_serve: spec drives the self-serve portal (localhost:9001).",
    "cockpit: spec drives the operator cockpit browser veneer (localhost:9002).",
]

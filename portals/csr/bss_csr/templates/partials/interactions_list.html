<div id="interactions-list"
     hx-get="/customer/{{ customer_id }}/interactions"
     hx-trigger="sse:agent-complete from:body"
     hx-swap="outerHTML">
{% if interactions %}
<table class="interactions-table">
  <thead>
    <tr><th>When</th><th>Channel</th><th>Direction</th><th>Summary</th></tr>
  </thead>
  <tbody>
    {% for i in interactions %}
    <tr>
      <td><code>{{ i.occurred_at[:19] | replace('T', ' ') }}</code></td>
      <td><span class="channel channel-{{ i.channel | replace('-', '_') }}">{{ i.channel }}</span></td>
      <td>{{ i.direction }}</td>
      <td>{{ i.summary }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="empty-state">No interactions yet.</p>
{% endif %}
</div>

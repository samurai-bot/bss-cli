<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Login · bss-cli csr console</title>
  <link rel="stylesheet" href="/portal-ui/static/css/portal_base.css" />
  <link rel="stylesheet" href="/static/css/csr.css" />
</head>
<body>
  <header class="portal-header">
    <div class="brand">
      <span class="brand-mark">$</span>
      <span class="brand-name">bss-cli</span>
      <span class="brand-tag">/ csr console / v0.5</span>
    </div>
  </header>

  <main class="login-shell">
    <form class="login-form" method="post" action="/login">
      <h1>CSR Console</h1>
      <p class="login-note">
        Accepts any credentials in dev mode. This is a demo console —
        real auth ships in Phase 12.
      </p>
      <label>Operator ID
        <input type="text" name="username" required autocomplete="username" placeholder="csr-demo-001" />
      </label>
      <label>Password
        <input type="password" name="password" autocomplete="current-password" placeholder="anything" />
      </label>
      <button type="submit">Sign in</button>
    </form>
  </main>

  <footer class="portal-footer">
    <span>internal demo console · stub auth · do not expose to public networks</span>
  </footer>
</body>
</html>

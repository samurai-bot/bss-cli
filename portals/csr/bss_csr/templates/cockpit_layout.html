<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{% block title %}BSS-CLI Operator Cockpit{% endblock %}</title>
  <meta name="viewport" content="width=1280" />
  <link rel="stylesheet" href="/portal-ui/static/css/portal_base.css" />
  <link rel="stylesheet" href="/static/css/csr.css" />
  <script src="/portal-ui/static/js/htmx.min.js" defer></script>
  <script src="/portal-ui/static/js/htmx-sse.js" defer></script>
</head>
<body
  {% if stream_session_id %}
  hx-ext="sse"
  sse-connect="/cockpit/{{ stream_session_id }}/events"
  {% endif %}
>
  <header class="portal-header">
    <div class="brand">
      <span class="brand-mark">$</span>
      <span class="brand-name">bss-cli</span>
      <span class="brand-tag">/ operator cockpit / v0.13</span>
    </div>
    <nav>
      <a href="/">sessions</a>
      <span class="nav-actor">@{{ actor }}</span>
      <span class="nav-meta">{{ model }}</span>
    </nav>
  </header>

  <main class="portal-layout cockpit-layout">
    {% block main %}{% endblock %}
  </main>

  <footer class="portal-footer">
    <span>operator cockpit · single-operator-by-design · perimeter trust · settings.toml authoritative</span>
  </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>BSS-CLI Cockpit{% block title_suffix %}{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <link rel="stylesheet" href="/portal-ui/static/css/portal_base.css?v={{ asset_v }}" />
  <link rel="stylesheet" href="/static/css/csr.css?v={{ asset_v }}" />
  <script src="/portal-ui/static/js/htmx.min.js?v={{ asset_v }}" defer></script>
  <script src="/portal-ui/static/js/htmx-sse.js?v={{ asset_v }}" defer></script>
  <script>
  // v1.6.1 — app-shell height from the *visual* viewport. On iPadOS the
  // soft keyboard / accessory bar does NOT resize the layout viewport
  // (so 100dvh never shrinks); Safari instead PANS the visual viewport,
  // sliding the compose box half off screen. We size the shell off
  // visualViewport.height and re-pin the pan offset on every vv event,
  // so the bottom edge (chat compose) is always on screen. Browsers
  // without the API keep the 100dvh/100vh CSS fallback.
  (function () {
    var vv = window.visualViewport;
    if (!vv) return;
    var root = document.documentElement;
    function sync() {
      root.style.setProperty("--app-height", vv.height + "px");
      // Counter Safari's focus-scroll pan: the shell never scrolls, so
      // any layout-viewport offset is unwanted.
      if (window.scrollY || vv.offsetTop) window.scrollTo(0, 0);
    }
    vv.addEventListener("resize", sync);
    vv.addEventListener("scroll", sync);
    window.addEventListener("orientationchange", sync);
    document.addEventListener("DOMContentLoaded", sync);
    sync();
  })();
  </script>
</head>
<body>
  <header class="cockpit-header">
    <div class="cockpit-header-left">
      <a href="/" class="cockpit-brand">
        <span class="cockpit-brand-mark">●</span>
        <span class="cockpit-brand-name">bss-cli</span>
        <span class="cockpit-brand-tag">operator cockpit · v{{ bss_release }}</span>
      </a>
    </div>
    <nav class="cockpit-header-nav">
      <a href="/" class="cockpit-nav-link {% if active_page == 'sessions' %}is-active{% endif %}">Sessions</a>
      <a href="/customers" class="cockpit-nav-link {% if active_page == 'customers' %}is-active{% endif %}">Customers</a>
      <a href="/cases" class="cockpit-nav-link {% if active_page == 'cases' %}is-active{% endif %}">Cases</a>
      <a href="/orders" class="cockpit-nav-link {% if active_page == 'orders' %}is-active{% endif %}">Orders</a>
      <a href="/catalog" class="cockpit-nav-link {% if active_page == 'catalog' %}is-active{% endif %}">Catalog</a>
      <form method="post" action="/cockpit/new" class="cockpit-nav-form">
        <button type="submit" class="cockpit-nav-cta">+ New conversation</button>
      </form>
      <a href="/settings" class="cockpit-nav-link {% if active_page == 'settings' %}is-active{% endif %}">Settings</a>
    </nav>
    <div class="cockpit-header-right">
      <span class="cockpit-meta">{{ model or "(env default)" }}</span>
    </div>
  </header>

  <main class="cockpit-main">
    {% block main %}{% endblock %}
  </main>
</body>
</html>

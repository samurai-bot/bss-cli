{% extends "base.html" %}
{% block title %}Get started · bss-cli self-serve{% endblock %}

{% block main %}
<section class="dashboard-empty">
  <h1 class="page-title">Welcome{% if email %}, {{ email }}{% endif %}.</h1>
  <p class="page-subtitle">
    You don't have any lines yet. Pick a plan to get started — KYC + payment
    happen in the next step.
  </p>

  <div class="dashboard-empty-cta-row">
    <a class="welcome-cta welcome-cta--primary" href="/plans">Browse plans</a>
    <form method="post" action="/auth/logout" class="dashboard-logout-form">
      <button type="submit" class="welcome-cta">Sign out</button>
    </form>
  </div>
</section>
{% endblock %}

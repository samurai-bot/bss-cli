{% extends "base.html" %}
{% block title %}Activating {{ plan_id }} · bss-cli self-serve{% endblock %}

{% block main %}
<h1 class="page-title">Activating <span class="accent">{{ plan_id }}</span></h1>
<p class="page-subtitle">Finalizing your eSIM. This refreshes itself.</p>

<div
  id="activation-status"
  hx-get="/activation/{{ order_id }}/status?session={{ session_id }}"
  hx-trigger="load delay:500ms, every 1s"
  hx-swap="innerHTML"
>
  {% include "partials/activation_stepper.html" %}
</div>
{% endblock %}

name: portal_self_serve_signup_direct
description: |
  v0.11 hero: full account-first signup funnel, direct-write end-to-end.
  Replaces ``portal_self_serve_signup_v0_8.yaml`` (now at
  ``scenarios/archive/`` for regression reference, not run by
  ``make scenarios-hero``).

    1. Visitor lands on /welcome (public).
    2. Browses /plans (public), sees anonymous CTAs that bounce
       through /auth/login?next=...
    3. POST /auth/login emits an OTP + magic link via
       LoggingEmailAdapter (the dev mailbox).
    4. file: step reads the dev mailbox, captures the OTP.
    5. POST /auth/check-email with the OTP — session cookie set.
    6. GET /signup/{plan}/msisdn (now gated) — picks an MSISDN.
    7. GET /signup/{plan}?msisdn=... renders the form.
    8. POST /signup — runs ``crm.create_customer`` directly +
       ``portal_auth.link_to_customer``; redirects to the progress page.
    9. /signup/step/kyc → ``crm.attest_kyc`` (one BSS write).
   10. /signup/step/cof → ``payment.create_payment_method`` (PAN
       tokenized client-side; one BSS write).
   11. /signup/step/order → ``com.create_order`` + ``submit_order``
       (one conceptual write — the orchestrator's order.create tool
       wraps the same two calls).
   12. /signup/step/poll → polls ``com.get_order`` until completed,
       then emits ``HX-Redirect`` to /confirmation.
   13. Backend-side assertions: subscription is active, identity row
       linked, channel attribution is portal-self-serve.

  Doctrine commitments (V0_11_0.md):

    * No ``astream_once`` is invoked on the orchestrator side. The
      doctrine guard ``rg 'astream_once' portals/self-serve/bss_self_serve/routes/``
      stays empty post-v0.11 (chat surface lands in v0.12+).
    * Wall time well under 10 seconds, three runs in a row.

  Pre-reqs:
    - `make up-all` (or equivalent) so the portal container is on the
      v0.11 image with BSS_PORTAL_DEV_MAILBOX_PATH pointing into the
      volume-mounted ./.dev-mailbox/ directory.
    - BSS_PORTAL_TOKEN_PEPPER set in .env (a real openssl-generated
      32+-char value, not the changeme sentinel).
    - BSS_LLM_API_KEY does NOT have to be set for this scenario (no
      LLM round-trips on the signup path). It's still required for
      the ``llm_*`` heroes that run alongside this one.

tags: [hero, portal, regression]

setup:
  reset_operational_data: true
  freeze_clock_at: "2026-05-05T09:00:00+08:00"

variables:
  customer_email: "portal-demo-{{ run_id }}@bss-cli.local"
  customer_phone: "+6590009999"
  customer_name: "Portal Demo {{ run_id }}"
  plan: PLAN_M
  # Scenario runner runs from the host; portal is published on 9001.
  portal_base: "http://localhost:9001"
  # Host-side path of the volume-mounted dev mailbox file.
  dev_mailbox: "./.dev-mailbox/portal-mailbox.log"

steps:
  # ── 1. Public surfaces work without a session ───────────────────────────

  - name: visit /welcome
    http: GET /welcome
    base_url: "{{ portal_base }}"
    expect:
      status: 200
      body_contains: ["bss-cli self-serve", "Sign in", "Browse plans"]

  - name: visit /plans
    http: GET /plans
    base_url: "{{ portal_base }}"
    expect:
      status: 200
      body_contains:
        - PLAN_M
        - 'href="/auth/login?next=/signup/PLAN_M/msisdn"'
      # Doctrine: no Agent Activity widget on signup pages.
      body_not_contains: ["Agent Activity", "sse-connect"]

  # ── 2. Email login — start, then read OTP from the dev mailbox ──────────

  - name: POST /auth/login emits OTP via LoggingEmailAdapter
    http: POST /auth/login
    base_url: "{{ portal_base }}"
    form:
      email: "{{ customer_email }}"
      next: "/signup/{{ plan }}/msisdn"
    expect:
      status: 303
      # v0.15: redirect URL now goes through ``urllib.parse.urlencode``
      # so ``@`` → ``%40``, ``/`` → ``%2F``. The earlier
      # f-string-built URL broke Gmail '+addressing' (raw ``+`` decoded
      # back to space at the next route's ``Query(...)`` parser).
      headers_match:
        location: "/auth/check-email?email=portal-demo-{{ run_id }}%40bss-cli.local&next=%2Fsignup%2F{{ plan }}%2Fmsisdn"

  - name: read OTP from dev mailbox
    file: "{{ dev_mailbox }}"
    capture_regex:
      otp:
        # Match the most-recent OTP block in the mailbox (file_step
        # uses the LAST regex match, so concurrent runs don't poison
        # each other as long as the OTP for THIS email comes after
        # any earlier ones in append order).
        source: body_text
        pattern: 'OTP: (\d{6})'
    poll:
      interval_ms: 200
      timeout_seconds: 10

  # ── 3. Verify the OTP — session cookie set + redirect to next ───────────

  - name: POST /auth/check-email with the OTP
    http: POST /auth/check-email
    base_url: "{{ portal_base }}"
    form:
      email: "{{ customer_email }}"
      code: "{{ otp }}"
      next: "/signup/{{ plan }}/msisdn"
    expect:
      status: 303
    capture_regex:
      session_cookie:
        source: headers.set-cookie
        pattern: 'bss_portal_session=([^;]+)'

  # ── 4. Funnel — gated routes work with the session cookie ───────────────

  - name: pick an MSISDN from the picker
    http: GET /signup/{{ plan }}/msisdn
    base_url: "{{ portal_base }}"
    cookies: { bss_portal_session: "{{ session_cookie }}" }
    expect:
      status: 200
      body_contains: ["Pick your number", "msisdn-tile"]
      # Doctrine: signup pages don't render the agent-log widget.
      body_not_contains: ["Agent Activity"]
    capture_regex:
      chosen_msisdn:
        source: body_text
        pattern: 'msisdn=([0-9]{6,15})'

  - name: visit signup form
    http: GET /signup/{{ plan }}?msisdn={{ chosen_msisdn }}
    base_url: "{{ portal_base }}"
    cookies: { bss_portal_session: "{{ session_cookie }}" }
    expect:
      status: 200
      body_contains:
        # v0.15 dropped the prebaked "✓ Identity verified via Myinfo
        # (simulated)" badge from the order form (KYC happens AFTER
        # form submit at /signup/step/kyc, not before). The chosen
        # MSISDN remains the strong-shape assertion that the form
        # rendered correctly.
        - "{{ chosen_msisdn }}"
      body_not_contains:
        - "KYC-PREBAKED-001"
        - "Identity verified via Myinfo"

  # ── 5. Direct-write chain — five HTTP calls, one BSS write each ─────────

  - name: POST /signup runs crm.create_customer + link_to_customer
    http: POST /signup
    base_url: "{{ portal_base }}"
    cookies: { bss_portal_session: "{{ session_cookie }}" }
    form:
      plan: "{{ plan }}"
      name: "{{ customer_name }}"
      phone: "{{ customer_phone }}"
      msisdn: "{{ chosen_msisdn }}"
      card_pan: "4242424242424242"
    expect:
      status: 303
    capture_regex:
      signup_session_id:
        source: headers.location
        pattern: "session=([a-f0-9]+)"

  - name: GET progress page renders the 5-step timeline
    http: GET /signup/{{ plan }}/progress?session={{ signup_session_id }}
    base_url: "{{ portal_base }}"
    cookies: { bss_portal_session: "{{ session_cookie }}" }
    expect:
      status: 200
      body_contains: ["Activating", "create customer", "attest KYC"]
      # Doctrine: no SSE on the progress page (deterministic chain).
      body_not_contains: ["sse-connect", "/agent/events/"]

  - name: POST /signup/step/kyc — crm.attest_kyc
    http: POST /signup/step/kyc?session={{ signup_session_id }}
    base_url: "{{ portal_base }}"
    cookies: { bss_portal_session: "{{ session_cookie }}" }
    expect:
      status: 200
      # Step fragment carries the next-step trigger to /signup/step/cof.
      body_contains: ["/signup/step/cof"]

  - name: POST /signup/step/cof — payment.create_payment_method
    http: POST /signup/step/cof?session={{ signup_session_id }}
    base_url: "{{ portal_base }}"
    cookies: { bss_portal_session: "{{ session_cookie }}" }
    expect:
      status: 200
      body_contains: ["/signup/step/order"]

  - name: POST /signup/step/order — com.create_order + submit_order
    http: POST /signup/step/order?session={{ signup_session_id }}
    base_url: "{{ portal_base }}"
    cookies: { bss_portal_session: "{{ session_cookie }}" }
    expect:
      status: 200
      body_contains: ["/signup/step/poll"]

  # Poll the read-only step/poll route until the chain advances past
  # ``pending_activation``. The route returns a fragment carrying
  # ``hx-get="/signup/step/poll"`` while the order is still in progress;
  # once SOM activation lands and the route extracts SUB-*, the
  # response is an empty body with ``HX-Redirect`` set. So
  # ``body_not_contains: ["/signup/step/poll"]`` is the "done" signal:
  # absence of the next-poll trigger ⇒ chain has advanced past the
  # polling state. The simulator usually settles in well under 1s; a
  # 10-second deadline at 250ms intervals is generous.
  - name: poll until order completes (HX-Redirect to /confirmation)
    http: GET /signup/step/poll?session={{ signup_session_id }}
    base_url: "{{ portal_base }}"
    cookies: { bss_portal_session: "{{ session_cookie }}" }
    poll:
      interval_ms: 250
      timeout_seconds: 10
    expect:
      status: 200
      body_not_contains: ["/signup/step/poll"]

  # Capture the resulting subscription_id from the session-status JSON
  # surface (read-only, no orchestrator).
  - name: GET /api/session/{session_id} captures resulting ids
    http: GET /api/session/{{ signup_session_id }}
    base_url: "{{ portal_base }}"
    cookies: { bss_portal_session: "{{ session_cookie }}" }
    expect:
      status: 200
      body_contains: ['"done":true']
    capture:
      subscription_id: "$.body.subscription_id"
      customer_id: "$.body.customer_id"

  # ── 6. Backend-side verification ────────────────────────────────────────

  - name: subscription is active on PLAN_M
    assert:
      tool: subscription.get
      args: {subscription_id: "{{ subscription_id }}"}
      expect:
        state: active
        offeringId: "{{ plan }}"
      poll:
        interval_ms: 200
        timeout_seconds: 10

  - name: interaction log attributes the order to portal-self-serve
    assert:
      tool: interaction.list
      args: {customer_id: "{{ customer_id }}"}
      expect:
        any_match:
          channel: portal-self-serve
      poll:
        interval_ms: 200
        timeout_seconds: 10

teardown:
  unfreeze_clock: true

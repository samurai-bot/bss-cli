name: portal_self_serve_signup
description: |
  v0.4 hero: full self-serve portal signup driven entirely through HTTP.
  Submits the form, triggers the SSE stream (which runs the agent to
  completion), polls the session status endpoint until done, then
  verifies the resulting subscription state and channel attribution
  via backend tools.

  Proves three things simultaneously:
    - the portal's public HTTP surface works end-to-end
    - every portal write flowed through the orchestrator agent
    - CRM's interaction log correctly attributes the writes to
      `channel=portal-self-serve`

tags: [hero, portal, regression]

setup:
  reset_operational_data: true
  freeze_clock_at: "2026-05-05T09:00:00+08:00"

variables:
  customer_name: "Portal Demo {{ run_id }}"
  customer_email: "portal-demo-{{ run_id }}@bss-cli.local"
  customer_phone: "+6590009999"
  plan: PLAN_M
  # Scenarios run from the host — hit the published portal port, not
  # the compose-internal hostname. Override with BSS_PORTAL_BASE if
  # running from inside the compose network (e.g. a CI runner).
  portal_base: "http://localhost:9001"

steps:
  - name: visit landing page
    http: GET /
    base_url: "{{ portal_base }}"
    expect:
      status: 200
      body_contains: [PLAN_S, PLAN_M, PLAN_L, "Agent Activity"]

  - name: visit signup form
    http: GET /signup/{{ plan }}
    base_url: "{{ portal_base }}"
    expect:
      status: 200
      body_contains: ["KYC-PREBAKED-001", "4242 4242 4242 4242"]

  - name: submit signup form
    http: POST /signup
    base_url: "{{ portal_base }}"
    form:
      plan: "{{ plan }}"
      name: "{{ customer_name }}"
      email: "{{ customer_email }}"
      phone: "{{ customer_phone }}"
      card_pan: "4242424242424242"
    expect:
      status: 303
    capture_regex:
      session_id:
        source: headers.location
        pattern: "session=([a-f0-9]+)"

  - name: drive the agent via SSE
    http: GET /agent/events/{{ session_id }}
    base_url: "{{ portal_base }}"
    drain_stream: true
    timeout_seconds: 120
    expect:
      status: 200
      body_contains: ["event: redirect"]

  - name: wait for session to finish
    http: GET /api/session/{{ session_id }}
    base_url: "{{ portal_base }}"
    poll:
      interval_ms: 500
      timeout_seconds: 30
    expect:
      status: 200
      body_contains: ['"done":true']
    capture:
      subscription_id: "$.body.subscription_id"
      order_id: "$.body.order_id"
      customer_id: "$.body.customer_id"
      activation_code: "$.body.activation_code"

  - name: confirmation page renders the QR and LPA code
    http: GET /confirmation/{{ subscription_id }}?session={{ session_id }}
    base_url: "{{ portal_base }}"
    expect:
      status: 200
      body_contains:
        - "data:image/png;base64,"
        - "{{ subscription_id }}"
        - "{{ activation_code }}"

  # ── Backend-side verification: all writes reached the policy layer ──

  - name: subscription is active on PLAN_M
    assert:
      tool: subscription.get
      args: {subscription_id: "{{ subscription_id }}"}
      expect:
        state: active
        offeringId: "{{ plan }}"
      poll:
        interval_ms: 200
        timeout_seconds: 10

  - name: payment method on file for the customer
    assert:
      tool: payment.list_methods
      args: {customer_id: "{{ customer_id }}"}
      expect:
        any_match:
          type: card
          status: active

  - name: interaction log attributes the order to the portal channel
    assert:
      tool: interaction.list
      args: {customer_id: "{{ customer_id }}"}
      expect:
        any_match:
          channel: portal-self-serve
      poll:
        interval_ms: 200
        timeout_seconds: 10

teardown:
  unfreeze_clock: true
